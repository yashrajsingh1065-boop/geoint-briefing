<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Geoint Briefing{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #020617;
      --surface:     #0f1629;
      --surface2:    #1a2035;
      --surface3:    #232940;
      --border:      #1e293b;
      --border2:     #334155;
      --text:        #f1f5f9;
      --text2:       #cbd5e1;
      --muted:       #64748b;
      --accent:      #3b82f6;
      --accent2:     #60a5fa;

      --u5: #ef4444;
      --u4: #f97316;
      --u3: #eab308;
      --u2: #22c55e;
      --u1: #64748b;

      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;

      --radius: 6px;
      --radius-lg: 10px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: var(--accent2); text-decoration: none; transition: color 0.15s; }
    a:hover { color: var(--text); }

    .container { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; }
    .container.wide { max-width: 1240px; }

    /* ── Nav ── */
    .site-nav {
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
      margin-bottom: 2rem;
      background: rgba(2,6,23,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .site-nav .inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-nav .brand {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .site-nav .brand::before {
      content: "";
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(59,130,246,0.3);
    }
    .site-nav .nav-links { display: flex; gap: 1.5rem; }
    .site-nav .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    .site-nav .nav-links a:hover { color: var(--text); }

    /* ── Urgency badge ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .b5 { background: rgba(239,68,68,0.12);  color: var(--u5); border: 1px solid rgba(239,68,68,0.25); }
    .b4 { background: rgba(249,115,22,0.12); color: var(--u4); border: 1px solid rgba(249,115,22,0.25); }
    .b3 { background: rgba(234,179,8,0.12);  color: var(--u3); border: 1px solid rgba(234,179,8,0.25); }
    .b2 { background: rgba(34,197,94,0.12);  color: var(--u2); border: 1px solid rgba(34,197,94,0.25); }
    .b1 { background: rgba(100,116,139,0.12);color: var(--u1); border: 1px solid rgba(100,116,139,0.25); }

    /* ── Region tag ── */
    .tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Event card ── */
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.15rem 1.3rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .event-card:hover { background: var(--surface2); border-color: var(--border2); }
    .event-card.u5 { border-left-color: var(--u5); }
    .event-card.u4 { border-left-color: var(--u4); }
    .event-card.u3 { border-left-color: var(--u3); }
    .event-card.u2 { border-left-color: var(--u2); }
    .event-card.u1 { border-left-color: var(--u1); }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .card-title a { color: inherit; cursor: pointer; }
    .card-title a:hover { color: var(--accent2); }

    .card-sources {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      font-family: var(--font-mono);
    }
    .card-sources span { color: var(--text2); }

    /* ── Expandable analysis ── */
    details.analysis { margin-top: 0.4rem; }
    details.analysis > summary {
      cursor: pointer;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent2);
      padding: 3px 10px;
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: var(--radius);
      background: rgba(59,130,246,0.05);
      transition: background 0.15s;
      user-select: none;
    }
    details.analysis > summary::-webkit-details-marker { display: none; }
    details.analysis > summary:hover { background: rgba(59,130,246,0.1); }
    details.analysis > summary .arrow { font-size: 0.55rem; transition: transform 0.2s; }
    details.analysis[open] > summary .arrow { transform: rotate(90deg); }

    .analysis-body {
      margin-top: 0.75rem;
      padding: 1rem 1.1rem;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text2);
    }
    .analysis-body h4 {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .analysis-body section + section { margin-top: 0.9rem; }

    /* ── Loading / empty states ── */
    .state-box {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }
    .state-box h2 { color: var(--text); font-size: 1.2rem; font-weight: 600; margin-bottom: 0.6rem; }
    .state-box p { margin-bottom: 1.2rem; font-size: 0.88rem; }
    .state-box progress {
      width: 200px;
      appearance: none;
      -webkit-appearance: none;
      height: 3px;
      border: none;
      border-radius: 2px;
      background: var(--surface2);
    }
    .state-box progress::-webkit-progress-bar { background: var(--surface2); border-radius: 2px; }
    .state-box progress::-webkit-progress-value { background: var(--accent); border-radius: 2px; }

    /* ── Button ── */
    .btn {
      display: inline-block;
      padding: 0.45rem 1.1rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--accent);
      background: rgba(59,130,246,0.1);
      color: var(--accent2);
      transition: all 0.15s;
    }
    .btn:hover { background: rgba(59,130,246,0.2); color: var(--text); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Region bar ── */
    .region-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 1.25rem;
    }
    .region-bar .rb {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .page-header h1 { font-size: 1.25rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .page-meta {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(15,22,41,0.5); }

    /* ── Dashboard layout ── */
    .dash-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2rem;
      align-items: start;
    }

    /* ── Market sidebar ── */
    .market-sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: sticky;
      top: 4rem;
    }

    .mkt-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
    }

    .mkt-name {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 0.2rem;
    }

    .mkt-val {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.1rem;
    }

    .mkt-chg {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
    }
    .mkt-chg.up   { background: rgba(34,197,94,0.1);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    .mkt-chg.down { background: rgba(239,68,68,0.1);  color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }

    .sector-details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .sector-toggle {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      padding: 0.55rem 0.85rem;
      user-select: none;
      transition: background 0.15s;
    }
    .sector-toggle::-webkit-details-marker { display: none; }
    .sector-toggle:hover { background: var(--surface2); }
    .sector-toggle .arrow { font-size: 0.5rem; transition: transform 0.2s; }
    .sector-details[open] .sector-toggle .arrow { transform: rotate(90deg); }
    .sector-body {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0 0.5rem 0.6rem;
    }

    .sector-tile {
      padding: 0.45rem 0.75rem;
    }
    .sector-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sector-name {
      font-size: 0.75rem;
      color: var(--text2);
    }
    .sector-tile.gainer { border-left: 2px solid rgba(34,197,94,0.4); }
    .sector-tile.loser  { border-left: 2px solid rgba(239,68,68,0.4); }

    .mkt-header {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.15rem 0.25rem;
    }

    /* ── Live Story card ── */
    .story-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 1.15rem 1.3rem;
      margin-bottom: 0.75rem;
      position: relative;
      transition: background 0.2s;
    }
    .story-card:hover { background: var(--surface2); }
    .story-card.u5 { border-left-color: var(--u5); }
    .story-card.u4 { border-left-color: var(--u4); }
    .story-card.u3 { border-left-color: var(--u3); }
    .story-card.u2 { border-left-color: var(--u2); }
    .story-card.u1 { border-left-color: var(--u1); }

    .story-card .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.25);
    }
    .live-badge::before {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(239,68,68,0); }
    }

    .story-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin: 0.5rem 0 0.35rem;
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    /* ── Story timeline ── */
    .story-timeline {
      margin-top: 0.65rem;
      padding: 0;
    }

    .timeline-entry {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 0.65rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .timeline-entry:last-child { border-bottom: none; }

    .timeline-date {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
      padding-top: 2px;
      position: relative;
      padding-left: 14px;
      white-space: nowrap;
    }
    .timeline-date::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .timeline-content {
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .timeline-content .tl-title {
      font-weight: 600;
      color: var(--text2);
    }
    .timeline-content .tl-title a { color: inherit; cursor: pointer; }
    .timeline-content .tl-title a:hover { color: var(--accent2); }
    .timeline-content .tl-summary {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 0.15rem;
      line-height: 1.45;
    }

    /* ── Section labels ── */
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.65rem;
      padding: 0 0.15rem;
    }

    /* ── Action banner ── */
    .action-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--u3);
      border-radius: var(--radius-lg);
      padding: 0.75rem 1.1rem;
      margin-bottom: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .action-banner .action-text {
      font-size: 0.8rem;
      color: var(--text2);
      line-height: 1.5;
    }
    .action-banner .action-reason {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .action-btns {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .btn-sm {
      padding: 4px 12px;
      border-radius: var(--radius);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      transition: all 0.15s;
    }
    .btn-sm:hover { background: var(--surface3); }
    .btn-sm.approve { border-color: rgba(34,197,94,0.3); color: #22c55e; background: rgba(34,197,94,0.06); }
    .btn-sm.approve:hover { background: rgba(34,197,94,0.12); }
    .btn-sm.dismiss { border-color: rgba(100,116,139,0.3); color: var(--muted); }

    /* ── Historical context (nested collapsible) ── */
    .hist-context {
      margin-top: 0.65rem;
      padding-top: 0.65rem;
      border-top: 1px dashed var(--border);
    }
    .hist-context > summary {
      cursor: pointer;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      user-select: none;
      letter-spacing: 0.03em;
    }
    .hist-context > summary::-webkit-details-marker { display: none; }
    .hist-context > summary:hover { background: var(--surface2); }
    .hist-context > summary .arrow { font-size: 0.5rem; transition: transform 0.2s; }
    .hist-context[open] > summary .arrow { transform: rotate(90deg); }

    .hist-entries {
      margin-top: 0.5rem;
    }
    .timeline-entry.hist .timeline-date::before {
      background: var(--muted);
      opacity: 0.4;
    }
    .timeline-entry.hist .tl-title {
      color: var(--muted);
      font-weight: 500;
    }
    .timeline-entry.hist .tl-summary {
      color: var(--muted);
      opacity: 0.7;
    }

    /* ── Low-coverage (under-reported) story ── */
    .lc-label {
      color: #eab308;
      font-size: 0.6rem;
      margin-left: 0.35rem;
    }

    .lc-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(234,179,8,0.1);
      color: #eab308;
      border: 1px solid rgba(234,179,8,0.25);
    }
    .lc-badge::before {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #eab308;
      opacity: 0.7;
    }

    .story-card.lc-story {
      border-left-color: rgba(234,179,8,0.5);
      opacity: 0.92;
    }
    .story-card.lc-story:hover { opacity: 1; }
    .story-card.lc-story.u5 { border-left-color: rgba(234,179,8,0.7); }
    .story-card.lc-story.u4 { border-left-color: rgba(234,179,8,0.6); }
    .story-card.lc-story.u3 { border-left-color: rgba(234,179,8,0.5); }
    .story-card.lc-story.u2 { border-left-color: rgba(234,179,8,0.4); }
    .story-card.lc-story.u1 { border-left-color: rgba(234,179,8,0.3); }

    /* ── Concluded story (history) ── */
    .concluded-story {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.15rem 1.3rem;
      margin-bottom: 0.75rem;
    }
    .concluded-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(100,116,139,0.1);
      color: var(--u1);
      border: 1px solid rgba(100,116,139,0.25);
    }

    /* ── Collapsible Stories Section ── */
    .stories-collapsible {
      margin-bottom: 1rem;
    }
    .stories-collapsible > summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.5rem 0;
      user-select: none;
    }
    .stories-collapsible > summary::-webkit-details-marker { display: none; }
    .stories-collapsible > summary .arrow {
      font-size: 0.5rem;
      transition: transform 0.2s;
    }
    .stories-collapsible[open] > summary .arrow {
      transform: rotate(90deg);
    }
    .stories-body {
      margin-top: 0.5rem;
    }
    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.5rem 0 1.25rem;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .dash-layout {
        grid-template-columns: 1fr;
      }
      .market-sidebar {
        position: static;
        order: 2;
      }
      .events-col {
        order: 1;
      }
    }

    @media (max-width: 480px) {
      html { font-size: 14px; }
      .container { padding: 0 1rem; }
      .timeline-entry { grid-template-columns: 70px 1fr; }
    }

  </style>
</head>
